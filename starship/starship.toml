# Don't print a new line at the start of the prompt
add_newline = true
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $cmd_duration$username$hostname $directory $git_branch
# $character
# """
# Визначаємо структуру: лінія, потім блоки шляху, потім ввід
# Використовуємо окремі змінні для чистоти коду
format = """
[╭─](bold bright-green)\
[](bright-green)\
[](bright-green)\
[   ](bg:bright-green fg:#1a1a1a)\
$directory\
[](bright-green)\
[ ](bright-green)\
$fill\
\n\
[╰─](bold bright-green)[](bold bright-green) """

[fill]
symbol = ""
style = "bold bright-green"


[character]
success_symbol = "" # Прибираємо стандартну стрілку, бо у нас своя у форматі
error_symbol = "[✗](bold fg:#ff0000)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: cyan"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = "󰜥 [ ](bold fg:cyan)[$symbol $branch(:$remote_branch)](fg:black)[ ](bold fg:cyan)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:cyan bold fg:black)[](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "fg:#1a1a1a bg:bright-green"
format = "[ $path ]($style)"
truncate_to_repo = false

[directory.substitutions]
"/etc" = " etc"
"/usr" = " usr"
"/var" = " var"
"/root" = " root"
"Desktop" = " "
"Documents" = " "
"Downloads" = " "
"Music" = "󰎈"
"Pictures" = " "
"Videos" = " "
"GitHub" = "󰊤 "
"/" = "  "

[cmd_duration]
min_time = 0
format = '[  Time: ](bold fg:blue)[󰪢 $duration](bold fg:blue)[ -->](bold fg:blue)'
